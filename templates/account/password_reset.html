{% extends "account/base.html" %}

{% block account_content %}

<h3 class="text-center mb-4">
    Reset Password
</h3>

<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <button
        type="submit"
        class="btn btn-warning w-100">

        Send Reset Link

    </button>

</form>

<div class="mt-3 text-center">

    <a href="{% url 'account_login' %}">
        Back to Login
    </a>

</div>

{% endblock %}
