{% extends "account/base.html" %}

{% block account_content %}

<h3 class="text-center mb-4">
    Set New Password
</h3>

<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <button
        type="submit"
        class="btn btn-warning w-100">

        Change Password

    </button>

</form>

{% endblock %}
