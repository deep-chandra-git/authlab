<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AuthLab{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        label {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .btn-warning {
            background: #d4a017;
            border: none;
        }

        body {
            background: #f8f9fa;
        }

        .auth-card {
            max-width: 450px;
            margin: auto;
            margin-top: 80px;
            border: none;
            border-radius: 20px;
        }

        .brand {
            color: #d4a017;
            font-weight: bold;
        }
    </style>

</head>

<body>

    {% block content %}
    {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    {% block scripts %}
    {% endblock %}
</body>

</html>
